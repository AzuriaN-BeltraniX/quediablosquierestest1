<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Qué diablos quieres?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #1d1d1b;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 0 16px;
        }

        .logo {
            width: 100%;
            max-width: 250px;
            height: auto;
            animation: logoEntrance 0.8s ease-out forwards;
        }

        @keyframes logoEntrance {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .description {
            text-align: center;
            line-height: 1.6;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.01em;
            animation: fadeIn 0.8s ease-out 0.2s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .buttons {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: fadeIn 0.8s ease-out 0.4s forwards;
            opacity: 0;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-height: 44px;
            padding: 14px 24px;
            background-color: #b01917;
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            user-select: none;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(176, 25, 23, 0.35);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:focus {
            outline: 2px solid #ffffff;
            outline-offset: 2px;
        }

        .btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <main class="container">

       <img src="logo/logo-que-diablos-quieres.png" class="logo">

        <p class="description">
            Conoce nuestras promos, novedades y sorpresas especiales.<br>
            Discover our promos, news, and special surprises.
        </p>

        <nav class="buttons">

            <a href="resources/menu.pdf" target="_blank" class="btn">
                Menú Digital
            </a>

            <a href="https://www.instagram.com/quediablosquieres.food/" target="_blank" class="btn">
                Instagram
            </a>

            <a href="https://www.tiktok.com/@quediablosquieres" target="_blank" class="btn">
                TikTok
            </a>

            <a href="https://maps.app.goo.gl/kcZ4TGXjyQTEF9aRA" target="_blank" class="btn">
                Ubicación
            </a>

        </nav>
    </main>
</body>
</html>
